name: Publish package

on:
    release:
        types: created
    push:
        branches:
            - main

jobs:
    Publish:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write

        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"

            - name: Setup PNPM
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build
              run: pnpm exec turbo build --filter="@cnpx/cnpx"

            - name: Generate dev version
              if: github.event_name == 'push'
              run: |
                  cd cnpx/cnpx
                  CURRENT_VERSION=$(node -p "require('./package.json').version")
                  DEV_VERSION="${CURRENT_VERSION}-dev.$(date +'%Y%m%d%H%M%S')"
                  npm version "$DEV_VERSION" --no-git-tag-version

            - name: Deprecate previous dev versions
              if: github.event_name == 'push'
              run: |
                  PACKAGE_NAME=$(node -p "require('./cnpx/cnpx/package.json').name")
                  DEV_VERSIONS=$(npm view "$PACKAGE_NAME" versions --json | node -e "
                    const versions = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    const devVersions = versions.filter(v => v.includes('-dev.'));
                    devVersions.forEach(v => console.log(v));
                  ")
                  for VERSION in $DEV_VERSIONS; do
                    echo "Deprecating $PACKAGE_NAME@$VERSION"
                    npm deprecate "$PACKAGE_NAME@$VERSION" "Deprecated: superseded by a newer dev build" || true
                  done

            - name: Deprecate previous dev versions on release
              if: github.event_name == 'release'
              run: |
                  PACKAGE_NAME=$(node -p "require('./cnpx/cnpx/package.json').name")
                  DEV_VERSIONS=$(npm view "$PACKAGE_NAME" versions --json | node -e "
                    const versions = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                    const devVersions = versions.filter(v => v.includes('-dev.'));
                    devVersions.forEach(v => console.log(v));
                  ")
                  for VERSION in $DEV_VERSIONS; do
                    echo "Deprecating $PACKAGE_NAME@$VERSION"
                    npm deprecate "$PACKAGE_NAME@$VERSION" "Deprecated: superseded by a stable release" || true
                  done

            - name: Publish release
              if: github.event_name == 'release'
              run: pnpm --filter "./cnpx/cnpx" publish --provenance --access public --no-git-checks

            - name: Publish dev
              if: github.event_name == 'push'
              run: pnpm --filter "./cnpx/cnpx" publish --provenance --access public --no-git-checks --tag dev
