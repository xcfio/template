name: Publish package

on:
    release:
        types: created
    push:
        branches:
            - main

jobs:
    Publish:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write

        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"

            - name: Setup PNPM
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build
              run: pnpm exec turbo build --filter="@cnpx/cnpx"

            - name: Generate dev version
              if: github.event_name == 'push'
              run: |
                  cd cnpx/cnpx
                  CURRENT_VERSION=$(node -p "require('./package.json').version")
                  DEV_VERSION="${CURRENT_VERSION}-dev.$(date +'%Y%m%d%H%M%S')"
                  npm version "$DEV_VERSION" --no-git-tag-version

            - name: Publish release
              if: github.event_name == 'release'
              run: pnpm --filter "./cnpx/cnpx" publish --provenance --access public --no-git-checks

            - name: Publish dev
              if: github.event_name == 'push'
              run: pnpm --filter "./cnpx/cnpx" publish --provenance --access public --no-git-checks --tag dev
